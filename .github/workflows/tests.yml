name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run test suite
        run: pytest tools/tests/ -v

      - name: Validate starter repository
        run: python tools/validate.py

      - name: Check wiki starter health
        run: python wiki/scripts/knowledge_pm.py --mode health --root .

      - name: Generate and check derived indexes
        run: |
          python tools/index.py --force
          python tools/index.py --check
