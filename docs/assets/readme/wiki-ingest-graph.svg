  <rect x="956" y="792" width="392" height="48" fill="#111"/><text x="1152" y="823" text-anchor="middle" fill="#f7f5ec" class="s" font-size="15" font-weight="900" letter-spacing="2">SOURCE-BACKED KNOWLEDGE</text>
