<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ingest diverse sources into a connected research knowledge graph</title>
  <desc id="desc">PDF, poster, GitHub, and website source cards become traceable literature, concept, method, tool, idea, and experiment nodes, each retaining provenance to its source.</desc>
  <defs><pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#111" opacity=".12"/></pattern><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#111"/></marker><style>.s{font-family:Inter,Arial,sans-serif}.m{font-family:"JetBrains Mono",Menlo,monospace}.card{stroke:#111;stroke-width:3}.tag{font-family:Inter,Arial,sans-serif;font-weight:900;font-size:22px;letter-spacing:2px}.id{font-family:"JetBrains Mono",Menlo,monospace;font-weight:800;font-size:18px}.small{font-family:Inter,Arial,sans-serif;font-weight:700;font-size:17px;fill:#403d35}</style></defs>
  <rect width="1600" height="900" fill="#f7f5ec"/><rect x="34" y="34" width="1532" height="832" fill="url(#dots)" stroke="#111" stroke-width="3"/>
  <rect x="76" y="68" width="190" height="52" fill="#a8e0f0" class="card"/><text x="99" y="103" class="tag">WIKI</text>
  <text x="76" y="190" class="s" font-size="60" font-weight="900">Ingest anything. Build your research brain.</text><text x="77" y="238" class="s" font-size="24" font-weight="700" fill="#403d35">Every insight stays connected to its source—and to the work it informs.</text>
  <text x="76" y="306" class="tag">SOURCES</text><text x="560" y="306" class="tag">INGEST</text><text x="850" y="306" class="tag">CONNECTED KNOWLEDGE</text>

  <g transform="translate(76 342)">
    <g><rect x="8" y="8" width="346" height="92" fill="#111"/><rect width="346" height="92" fill="#f7f5ec" class="card"/><rect x="18" y="18" width="70" height="56" fill="#ff7dc1" class="card"/><text x="53" y="54" text-anchor="middle" class="s" font-size="16" font-weight="900" letter-spacing="2">PDF</text><text x="108" y="43" class="id">PAPER.PDF</text><text x="108" y="69" class="small">DOI · figures · references</text></g>
    <g transform="translate(0 116)"><rect x="8" y="8" width="346" height="92" fill="#111"/><rect width="346" height="92" fill="#f7f5ec" class="card"/><rect x="18" y="18" width="70" height="56" fill="#96f19b" class="card"/><text x="53" y="54" text-anchor="middle" class="s" font-size="11" font-weight="900" letter-spacing="1">POSTER</text><text x="108" y="43" class="id">POSTER.PNG</text><text x="108" y="69" class="small">claims · panels · people</text></g>
    <g transform="translate(0 232)"><rect x="8" y="8" width="346" height="92" fill="#111"/><rect width="346" height="92" fill="#111" class="card"/><rect x="18" y="18" width="70" height="56" fill="#a8e0f0" class="card"/><text x="53" y="54" text-anchor="middle" class="s" font-size="14" font-weight="900" letter-spacing="2">GIT</text><text x="108" y="43" fill="#f7f5ec" class="id">GITHUB REPO</text><text x="108" y="69" fill="#a8e0f0" class="small">code · methods · releases</text></g>
    <g transform="translate(0 348)"><rect x="8" y="8" width="346" height="92" fill="#111"/><rect width="346" height="92" fill="#f7f5ec" class="card"/><rect x="18" y="18" width="70" height="56" fill="#a8f0a8" class="card"/><text x="53" y="54" text-anchor="middle" class="s" font-size="13" font-weight="900" letter-spacing="1">WEB</text><text x="108" y="43" class="id">WEBSITE</text><text x="108" y="69" class="small">docs · protocols · context</text></g>
  </g>

  <path d="M438 384C500 384 487 500 540 500M438 500h102M438 616C500 616 487 500 540 500M438 732C500 732 487 500 540 500" stroke="#111" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <g transform="translate(560 400)"><rect x="10" y="10" width="224" height="224" fill="#111"/><rect width="224" height="224" fill="#a8e0f0" class="card"/><circle cx="112" cy="91" r="45" fill="#f7f5ec" class="card"/><path d="M91 91h42M112 70v42" stroke="#111" stroke-width="7"/><text x="112" y="168" text-anchor="middle" class="tag">AGENT</text><text x="112" y="198" text-anchor="middle" class="small">extract · connect</text></g>
