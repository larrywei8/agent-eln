  <g transform="translate(1304 562)"><rect x="8" y="8" width="194" height="86" fill="#111"/><rect width="194" height="86" fill="#f7f5ec" class="card"/><text x="18" y="35" class="id">TOOL-0008</text><text x="18" y="65" class="small">software</text></g>
  <g transform="translate(1130 684)"><rect x="8" y="8" width="202" height="86" fill="#111"/><rect width="202" height="86" fill="#a8f0a8" class="card"/><text x="18" y="35" class="id">IDEA-0026</text><text x="18" y="65" class="small">research idea</text></g>
