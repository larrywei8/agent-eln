<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Saved but disconnected versus connected by Agent ELN</title><desc id="desc">Four isolated research files have no relationships in the before state. In the after state, sample, method, paper, experiment, and result cards are joined by continuous provenance lines.</desc>
  <defs><pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.2" fill="#111" opacity=".12"/></pattern><style>.s{font-family:Inter,Arial,sans-serif}.m{font-family:"JetBrains Mono",Menlo,monospace}.c{stroke:#111;stroke-width:3}.l{stroke:#111;stroke-width:4;fill:none}.id{font-family:"JetBrains Mono",Menlo,monospace;font-weight:800;font-size:22px}.nm{font-family:Inter,Arial,sans-serif;font-weight:800;font-size:23px}</style></defs>
  <rect width="1600" height="900" fill="#f7f5ec"/><rect x="34" y="34" width="1532" height="832" fill="url(#dots)" stroke="#111" stroke-width="3"/>
  <rect x="76" y="70" width="353" height="58" fill="#ff7dc1" class="c"/><text x="101" y="109" class="s" font-size="23" font-weight="900" letter-spacing="2">THE CONTEXT PROBLEM</text>
  <text x="76" y="205" class="s" font-size="65" font-weight="900">Saved in ten places.</text><rect x="76" y="229" width="675" height="88" fill="#a8f0a8" class="c"/><text x="102" y="293" class="s" font-size="61" font-weight="900">Connected as one story.</text>
  <line x1="790" y1="370" x2="790" y2="800" stroke="#111" stroke-width="3" stroke-dasharray="10 10"/>
  <text x="80" y="386" class="s" font-size="28" font-weight="900">BEFORE · SAVED, BUT DISCONNECTED</text><text x="840" y="386" class="s" font-size="28" font-weight="900">AFTER · AGENT ELN CONNECTS IT</text>
  <g><rect x="92" y="448" width="250" height="140" fill="#f0ecd8" class="c"/><text x="116" y="490" class="nm">paper notebook</text><path d="M118 523h185M118 550h140" stroke="#777" stroke-width="4"/></g>
  <g><rect x="408" y="426" width="250" height="118" fill="#fff" class="c"/><text x="432" y="468" class="nm">samples.xlsx</text><path d="M432 490h190M432 513h190M490 480v50" stroke="#bbb" stroke-width="3"/></g>
  <g><rect x="110" y="638" width="290" height="115" fill="#a8e0f0" class="c"/><text x="134" y="680" class="nm">protocol-v3-final.pdf</text><text x="134" y="718" class="m" font-size="18">Which version?</text></g>
  <g><rect x="468" y="610" width="230" height="130" fill="#ff7dc1" class="c"/><text x="492" y="655" class="nm">analysis/</text><text x="492" y="692" class="m" font-size="18">final_final_2</text></g>
  <text x="80" y="825" class="s" font-size="27" font-weight="800" fill="#d5297d">The files exist. The relationships do not.</text>
  <path class="l" d="M1022 575H1070"/>
  <path class="l" d="M1022 708C1052 708 1042 620 1070 620"/>
  <path class="l" d="M1210 675V636"/>
  <path class="l" d="M1300 575H1365"/>
  <g><rect x="842" y="525" width="180" height="100" fill="#a8f0a8" class="c"/><text x="861" y="565" class="id">SMP-0024</text><text x="861" y="601" class="nm">cells</text></g>
  <g><rect x="842" y="658" width="180" height="100" fill="#96f19b" class="c"/><text x="861" y="698" class="id">SOP-0007</text><text x="861" y="734" class="nm">method</text></g>
  <g><rect x="1070" y="518" width="230" height="118" fill="#ff7dc1" class="c"/><text x="1090" y="560" class="id">EXP-07-14-01</text><text x="1090" y="600" class="nm">experiment</text></g>
  <g><rect x="1110" y="675" width="200" height="95" fill="#a8e0f0" class="c"/><text x="1130" y="713" class="id">LIT-0047</text><text x="1130" y="747" class="nm">paper</text></g>
  <g><rect x="1365" y="525" width="150" height="102" fill="#111" class="c"/><text x="1385" y="565" fill="#f7f5ec" class="id">RESULT</text><text x="1385" y="602" fill="#a8f0a8" class="nm">found</text></g>
  <text x="840" y="825" class="s" font-size="27" font-weight="800">Every record keeps its place in the story.</text>
</svg>
