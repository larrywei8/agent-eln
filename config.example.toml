# agent-eln configuration — copy to config.toml and edit, or export as env vars.
# All keys are optional; the tools run with zero config.
#
# Env-var equivalent is shown in the comment above each key.

# AGENT_ELN_USER — default author for `--by` flags on new records.
user = "me"

# AGENT_ELN_CONTACT_EMAIL — polite contact string for external APIs (Crossref, etc.).
# Providing a real email gets you into their higher-rate polite pool.
contact_email = "agent-eln@example.org"

# AGENT_ELN_WIKI_URL_PREFIX — URL prefix used when emitting links into your wiki
# (e.g. from the ELN's literature records to their wiki summaries).
# Leave empty to emit plain repo-relative paths, which work fine locally.
# Example: "https://your-host.example.com/?f="
wiki_url_prefix = ""

# AGENT_ELN_ELN_DIR / AGENT_ELN_LIMS_DIR / AGENT_ELN_METHODS_DIR / AGENT_ELN_WIKI_DIR
# — directory names inside the repo. Change only if you renamed the top-level folders.
eln_dir     = "eln"
lims_dir    = "lims"
methods_dir = "methods"
wiki_dir    = "wiki"
